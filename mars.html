<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mars' Boarding Live Feed</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.js"></script>
  <style>
    :root {
      --bg: #000;
      --ui-bg: rgba(0, 0, 0, 0.68);
      --ui-bg-hover: rgba(0, 0, 0, 0.8);
      --ui-border: rgba(255, 255, 255, 0.22);
      --ui-text: #fff;
      --ui-radius: 10px;
      --ui-shadow: 0 6px 24px rgba(0, 0, 0, 0.32);
      --control-h: 42px;
      --safe-pad: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--ui-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    #app {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    #viewer {
      position: absolute;
      inset: 0;
      background: #000;
      overflow: hidden;
      touch-action: manipulation;
    }

    #video-layer {
      position: absolute;
      inset: 0;
      transform-origin: center center;
      will-change: transform;
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    #switch-button,
    #back-button {
      position: absolute;
      pointer-events: auto;
      z-index: 6;
      height: var(--control-h);
      padding: 0 14px;
      border: 1px solid var(--ui-border);
      border-radius: var(--ui-radius);
      color: var(--ui-text);
      background: var(--ui-bg);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: var(--ui-shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background-color 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    #switch-button:hover,
    #back-button:hover {
      background: var(--ui-bg-hover);
      border-color: rgba(255, 255, 255, 0.3);
    }

    #switch-button:active,
    #back-button:active {
      transform: translateY(1px);
    }

    #back-button {
      width: 40px;
      min-width: 40px;
      padding: 0;
      line-height: 1;
    }

    #back-button i {
      font-size: 14px;
    }

    #back-button:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 7;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      pointer-events: none;
    }

    #loading-card {
      border: 1px solid var(--ui-border);
      background: var(--ui-bg);
      border-radius: var(--ui-radius);
      box-shadow: var(--ui-shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 14px 18px;
      min-width: 180px;
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.02em;
      font-weight: 600;
    }

    #version-badge {
      position: absolute;
      z-index: 8;
      right: max(10px, env(safe-area-inset-right));
      top: max(10px, env(safe-area-inset-top));
      color: #ff4d4d;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 77, 77, 0.45);
      border-radius: 999px;
      padding: 6px 10px;
      pointer-events: none;
    }

    #cam-buttons {
      position: absolute;
      z-index: 8;
      right: max(10px, env(safe-area-inset-right));
      bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .cam-button {
      min-width: 40px;
      height: var(--control-h);
      padding: 0 12px;
      border: 1px solid var(--ui-border);
      border-radius: var(--ui-radius);
      color: var(--ui-text);
      background: var(--ui-bg);
      box-shadow: var(--ui-shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background-color 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    .cam-button:hover {
      background: var(--ui-bg-hover);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .cam-button:active {
      transform: translateY(1px);
    }

    .cam-button.is-active {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.12);
    }

    @media (max-width: 700px) {
      #switch-button {
        font-size: 14px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewer" aria-label="Live dog boarding camera">
      <div id="video-layer">
        <video
          id="video"
          autoplay
          muted
          playsinline
          webkit-playsinline
          preload="auto"
        ></video>
      </div>
      <div id="overlay" aria-hidden="true">
        <button id="switch-button" type="button">Next View</button>
        <button id="back-button" type="button" aria-label="Go back to previous view" title="Previous View">
          <i class="fa-solid fa-rotate-left" aria-hidden="true"></i>
        </button>
        <div id="loading-overlay">
          <div id="loading-card">Loading Feed...</div>
        </div>
        <div id="cam-buttons" aria-label="Camera feed selector"></div>
        <div id="version-badge">VER 2026-02-23</div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const FEED_PARAMS = "?user=stream&pw=cbwmesa";
      const BASE_PATHS = [
        "https://cbwmesa.campbowwow.pro/h264/Snout_2/temp.m3u8",
        "https://cbwmesa.campbowwow.pro/h264/PY2_IN/temp.m3u8",
        "https://cbwmesa.campbowwow.pro/h264/PY2_OUT/temp.m3u8"
      ];
      const FEEDS = BASE_PATHS.map((path) => path + FEED_PARAMS);

      const viewer = document.getElementById("viewer");
      const videoLayer = document.getElementById("video-layer");
      const video = document.getElementById("video");
      const switchButton = document.getElementById("switch-button");
      const backButton = document.getElementById("back-button");
      const camButtonsEl = document.getElementById("cam-buttons");
      const loadingOverlay = document.getElementById("loading-overlay");
      const loadingCard = document.getElementById("loading-card");

      const IS_IOS =
        /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      let feedIndex = 0;
      let previousFeedIndex = null;
      let hls = null;
      let dotsTimer = null;
      let dots = 0;
      let loadingLabelBase = "Loading Feed";
      let loadingShownAt = 0;
      let pendingStopLoadingTimer = null;
      let holdLoadingUntilPlaying = false;
      let activeLoadToken = 0;
      let panzoom = null;
      let relayoutRaf = 0;
      let camButtons = [];

      function configureVideoEl() {
        video.muted = true;
        video.defaultMuted = true;
        video.autoplay = true;
        video.playsInline = true;
        if ("webkitPlaysInline" in video) video.webkitPlaysInline = true;
        video.setAttribute("muted", "");
        video.setAttribute("autoplay", "");
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.preload = "auto";
      }

      function startLoading(label) {
        if (pendingStopLoadingTimer) {
          clearTimeout(pendingStopLoadingTimer);
          pendingStopLoadingTimer = null;
        }
        loadingOverlay.style.display = "flex";
        loadingShownAt = Date.now();
        dots = 0;
        loadingLabelBase = label || "Loading Feed";
        loadingCard.textContent = loadingLabelBase;
        clearInterval(dotsTimer);
        dotsTimer = setInterval(() => {
          if (loadingOverlay.style.display === "none") return;
          dots = (dots + 1) % 4;
          loadingCard.textContent = loadingLabelBase + ".".repeat(dots);
        }, 450);
      }

      function stopLoading() {
        const elapsed = Date.now() - loadingShownAt;
        const minVisibleMs = 220;
        if (loadingOverlay.style.display !== "none" && elapsed < minVisibleMs) {
          if (pendingStopLoadingTimer) clearTimeout(pendingStopLoadingTimer);
          pendingStopLoadingTimer = setTimeout(() => {
            pendingStopLoadingTimer = null;
            stopLoading();
          }, minVisibleMs - elapsed);
          return;
        }
        clearInterval(dotsTimer);
        dotsTimer = null;
        dots = 0;
        loadingLabelBase = "Loading Feed";
        loadingCard.textContent = "Loading Feed...";
        loadingOverlay.style.display = "none";
      }

      function tryPlay(aggressive) {
        configureVideoEl();
        const p = video.play();
        if (p && typeof p.catch === "function") {
          p.catch(() => {
            if (aggressive) {
              setTimeout(() => {
                video.play().catch(() => {});
              }, 500);
            }
          });
          p.then(() => {
            if (video.readyState >= 2 && !holdLoadingUntilPlaying) stopLoading();
          }).catch(() => {});
        } else {
          if (!video.paused && video.readyState >= 2 && !holdLoadingUntilPlaying) stopLoading();
        }
      }

      function autoplayBurst() {
        tryPlay(true);
        [120, 350, 800, 1500].forEach((ms) => {
          setTimeout(() => {
            if (document.visibilityState !== "visible") return;
            tryPlay(false);
          }, ms);
        });
      }

      function teardownStream() {
        if (hls) {
          try { hls.destroy(); } catch (_) {}
          hls = null;
        }
      }

      function scheduleRelayout() {
        if (relayoutRaf) cancelAnimationFrame(relayoutRaf);
        relayoutRaf = requestAnimationFrame(() => {
          relayoutRaf = 0;
          positionSwitchButton();
        });
      }

      function getFrameRectInLayer(layerW, layerH, offsetLeft, offsetTop) {
        const videoW = video.videoWidth || 16;
        const videoH = video.videoHeight || 9;
        const videoAspect = videoW / videoH;
        const layerAspect = layerW / Math.max(1, layerH);

        let drawW;
        let drawH;
        if (layerAspect > videoAspect) {
          drawH = layerH;
          drawW = drawH * videoAspect;
        } else {
          drawW = layerW;
          drawH = drawW / videoAspect;
        }

        const left = offsetLeft + (layerW - drawW) * 0.5;
        const top = offsetTop + (layerH - drawH) * 0.5;
        return { left, top, width: drawW, height: drawH };
      }

      function getVisibleVideoRect() {
        const viewerRect = viewer.getBoundingClientRect();
        return getFrameRectInLayer(viewerRect.width, viewerRect.height, 0, 0);
      }

      function positionSwitchButton() {
        const btnW = switchButton.offsetWidth || 110;
        const btnH = switchButton.offsetHeight || 40;
        const backW = backButton.offsetWidth || 40;
        const pad = 10;
        const left = pad;
        const top = Math.max(pad, viewer.clientHeight - btnH - pad);
        switchButton.style.left = left + "px";
        switchButton.style.top = top + "px";
        backButton.style.left = (left + btnW + 8) + "px";
        backButton.style.top = top + "px";
        backButton.style.width = backW + "px";
      }

      function updateBackButton() {
        backButton.disabled = previousFeedIndex == null || previousFeedIndex === feedIndex;
      }

      function updateCamButtons() {
        camButtons.forEach((btn, idx) => {
          btn.classList.toggle("is-active", idx === feedIndex);
          btn.setAttribute("aria-pressed", idx === feedIndex ? "true" : "false");
        });
        updateBackButton();
      }

      function goToFeed(index, options) {
        if (index === feedIndex) return;
        previousFeedIndex = feedIndex;
        loadFeed(index, options || { label: "Switching View", holdUntilPlaying: true });
      }

      function buildCamButtons() {
        camButtonsEl.innerHTML = "";
        camButtons = FEEDS.map((_, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "cam-button";
          btn.textContent = String(idx + 1);
          btn.setAttribute("aria-label", "Switch to camera " + (idx + 1));
          btn.addEventListener("click", () => {
            goToFeed(idx, { label: "Switching View", holdUntilPlaying: true });
          });
          camButtonsEl.appendChild(btn);
          return btn;
        });
        updateCamButtons();
      }

      function attachNativeLoadHandlers(loadToken) {
        const onPlayable = () => {
          if (loadToken !== activeLoadToken) return;
          scheduleRelayout();
          autoplayBurst();
          // On iOS, native HLS may be ready but autoplay can still be blocked.
          // Don't leave the loading overlay up forever if the stream is already buffered.
          if (IS_IOS && video.readyState >= 2 && !holdLoadingUntilPlaying) {
            stopLoading();
          }
        };
        const onPlaying = () => {
          if (loadToken !== activeLoadToken) return;
          holdLoadingUntilPlaying = false;
          stopLoading();
          scheduleRelayout();
        };
        const onError = () => {
          if (loadToken !== activeLoadToken) return;
          stopLoading();
        };

        video.addEventListener("loadedmetadata", onPlayable, { once: true });
        video.addEventListener("loadeddata", onPlayable, { once: true });
        video.addEventListener("canplay", onPlayable, { once: true });
        video.addEventListener("canplaythrough", onPlayable, { once: true });
        video.addEventListener("playing", onPlaying, { once: true });
        video.addEventListener("error", onError, { once: true });
      }

      function loadFeed(index, options) {
        const opts = options || {};
        const token = ++activeLoadToken;
        holdLoadingUntilPlaying = !!opts.holdUntilPlaying;
        feedIndex = index;
        updateCamButtons();
        const feedUrl = FEEDS[index];
        video.dataset.feedUrl = feedUrl;
        startLoading(opts.label || "Loading Feed...");
        configureVideoEl();
        teardownStream();

        try {
          video.pause();
        } catch (_) {}

        if (Hls.isSupported() && !IS_IOS) {
          hls = new Hls({
            liveDurationInfinity: true,
            enableWorker: true
          });

          hls.on(Hls.Events.ERROR, (_, data) => {
            if (token !== activeLoadToken) return;
            if (!data || !data.fatal) return;
            stopLoading();
          });

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            if (token !== activeLoadToken) return;
            scheduleRelayout();
            tryPlay(true);
          });

          hls.on(Hls.Events.FRAG_LOADED, () => {
            if (token !== activeLoadToken) return;
            if (!holdLoadingUntilPlaying && loadingOverlay.style.display !== "none") stopLoading();
          });

          hls.loadSource(feedUrl);
          hls.attachMedia(video);
          attachNativeLoadHandlers(token);
          return;
        }

        video.removeAttribute("src");
        video.src = feedUrl;
        video.load();
        attachNativeLoadHandlers(token);
      }

      function nextFeed() {
        const nextIndex = (feedIndex + 1) % FEEDS.length;
        switchButton.textContent = "Next View";
        goToFeed(nextIndex, { label: "Switching View", holdUntilPlaying: true });
      }

      function goBackFeed() {
        if (previousFeedIndex == null || previousFeedIndex === feedIndex) return;
        const target = previousFeedIndex;
        switchButton.textContent = "Next View";
        goToFeed(target, { label: "Switching View", holdUntilPlaying: true });
      }

      function onVisibilityChange() {
        if (document.visibilityState === "visible") {
          setTimeout(() => tryPlay(false), 50);
          setTimeout(() => tryPlay(false), 600);
        }
      }

      function initPanzoom() {
        panzoom = Panzoom(videoLayer, {
          maxScale: 24,
          minScale: 1,
          contain: "outside"
        });
        viewer.style.touchAction = "none";
        viewer.addEventListener("wheel", (e) => {
          panzoom.zoomWithWheel(e, { step: 0.4 });
        }, { passive: false });
      }

      function initEventGuards() {
        configureVideoEl();

        video.addEventListener("loadedmetadata", scheduleRelayout);
        video.addEventListener("resize", scheduleRelayout);
        window.addEventListener("resize", scheduleRelayout);
        window.addEventListener("orientationchange", () => {
          setTimeout(scheduleRelayout, 50);
          setTimeout(scheduleRelayout, 400);
        });

        document.addEventListener("visibilitychange", onVisibilityChange);

        video.addEventListener("ended", stopLoading);
        video.addEventListener("playing", stopLoading);
        video.addEventListener("loadeddata", () => {
          if (IS_IOS && video.readyState >= 2 && !holdLoadingUntilPlaying) stopLoading();
        });
        video.addEventListener("canplay", () => {
          if (IS_IOS && video.readyState >= 2 && !holdLoadingUntilPlaying) stopLoading();
        });
        // `emptied` fires during source swaps; don't hide the loader here or
        // the user sees a black gap before the next feed starts rendering.
        video.addEventListener("emptied", () => {});
      }

      switchButton.addEventListener("click", nextFeed);
      backButton.addEventListener("click", goBackFeed);

      initPanzoom();
      initEventGuards();
      buildCamButtons();
      updateBackButton();
      positionSwitchButton();
      loadFeed(feedIndex);

    })();
  </script>
</body>
</html>
